<!DOCTYPE html>
<html lang="en">

<head>
    <title>boxes &amp; glue · linebreak tester</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="garamond.css">
</head>

<body>
    <div class="container">
        <header>
            <img src="logo.png" alt="boxes &amp; glue" class="logo">
            <p class="tagline">linebreak tester</p>
            <a class="repo-link" href="https://github.com/speedata/linebreak-web">
                <img src="https://github.githubassets.com/assets/GitHub-Mark-ea2971cee799.png" alt="GitHub">
                <span>More info? See the repository</span>
            </a>
        </header>

        <form>
            <div class="card">
                <div class="range-row">
                    <label for="hsize">Horizontal size</label>
                    <input id="hsize" type="range" min="0" max="600" value="300"
                        oninput="rangeValue.innerText = this.value; drawtext();">
                    <span class="value"><span id="rangeValue">300</span> pt</span>
                </div>
            </div>

            <div class="canvas-wrap">
                <canvas width="300" height="220">typeset paragraph</canvas>
            </div>

            <div class="card">
                <div class="fields">
                    <div class="field">
                        <label for="zoom">Zoom</label>
                        <input id="zoom" type="number" value="3" oninput="drawtext()">
                    </div>
                    <div class="field">
                        <label for="fontsize">Font size</label>
                        <div class="input-unit">
                            <input id="fontsize" type="number" value="10" oninput="drawtext()">
                            <span class="unit">pt</span>
                        </div>
                    </div>
                    <div class="field">
                        <label for="leading">Leading</label>
                        <div class="input-unit">
                            <input id="leading" type="number" value="12" oninput="drawtext()">
                            <span class="unit">pt</span>
                        </div>
                    </div>
                    <div class="field">
                        <label for="tolerance">Tolerance</label>
                        <input id="tolerance" type="number" value="4.0" oninput="drawtext()">
                    </div>
                    <div class="field">
                        <label for="hyphenpenalty">Hyphen penalty</label>
                        <input id="hyphenpenalty" type="number" value="50" oninput="drawtext()">
                    </div>
                    <div class="field">
                        <label for="demeritsfitness">Demerits fitness</label>
                        <input id="demeritsfitness" type="number" value="100" oninput="drawtext()">
                    </div>
                    <div class="field">
                        <label for="emergencystretch">Emergency stretch</label>
                        <div class="input-unit">
                            <input id="emergencystretch" type="number" value="0" min="0" step="1" oninput="drawtext()">
                            <span class="unit">pt</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="toggles">
                    <label class="toggle">
                        <input id="hyphenate" type="checkbox" onchange="drawtext()" checked>
                        Hyphenate
                    </label>
                    <label class="toggle">
                        <input id="squeezeoverfullboxes" type="checkbox" onchange="drawtext()">
                        Squeeze overfull lines
                    </label>
                    <label class="toggle">
                        <input id="hangingpunctuationend" type="checkbox" onchange="drawtext()">
                        Hanging punctuation
                    </label>
                </div>
            </div>

            <div class="card">
                <textarea id="rendertext" rows="3" onkeyup="drawtext()">In olden times when wishing still helped one, there lived a king whose daughters were all beautiful, but the youngest was so beautiful that the sun itself, which has seen so much, was astonished whenever it shone in her face.</textarea>
            </div>

            <div class="card" id="tablediv"></div>

            <div class="actions">
                <button type="button" class="btn-reset" onclick="clearCookies(); location.reload()">Reset everything</button>
            </div>
        </form>

        <script src="wasm_exec.js"></script>
        <script src="renderer.js"></script>
    </div>
</body>

</html>
